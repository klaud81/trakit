services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trakit-backend
    ports:
      - "8000:8000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./data:/data
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - TRAKIT_DATA_DIR=/data
      - TRAKIT_HOST=0.0.0.0
      - TRAKIT_PORT=8000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trakit-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
