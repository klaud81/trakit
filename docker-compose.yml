services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trakit-backend
    ports:
      - "8000:8000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./data:/data
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - TRAKIT_DATA_DIR=/data
      - TRAKIT_HOST=0.0.0.0
      - TRAKIT_PORT=8000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trakit-frontend
    # 호스트 포트 미공개 — nginx 프록시가 내부 네트워크로 접근
    expose:
      - "80"
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: trakit-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
