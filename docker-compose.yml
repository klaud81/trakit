services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trakit-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data:ro
    environment:
      - TRAKIT_DATA_DIR=/data
      - TRAKIT_HOST=0.0.0.0
      - TRAKIT_PORT=8000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trakit-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
