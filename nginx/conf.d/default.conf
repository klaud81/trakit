# WebSocket 업그레이드 매핑 (http 컨텍스트)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name trakit.stock-snow.com;

    return 301 https://$host$request_uri;
}

# HTTPS (TLS 종료)
server {
    listen 443 ssl;
    http2 on;
    server_name trakit.stock-snow.com;

    ssl_certificate     /etc/letsencrypt/live/trakit.stock-snow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trakit.stock-snow.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS (1년)
    add_header Strict-Transport-Security "max-age=31536000" always;

    # API + WebSocket → backend 직접 라우팅 (/api/ws/* 실시간)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # SPA (정적 자산 + 라우팅 폴백) → frontend
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
