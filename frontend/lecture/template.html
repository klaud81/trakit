<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{TITLE}}</title>
<meta name="description" content="{{DESCRIPTION}}">
<meta name="robots" content="{{ROBOTS}}">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root {
  --bg: #FAFBFE; --bg2: #F2F4F8; --sf: #FFFFFF; --bd: #E8ECF2;
  --tx: #1A1D26; --tx2: #3D4351; --dm: #8B95A8;
  --am: #C49930; --am2: #E8C063; --am3: #FBE9B5; --am4: #FFF6E5;
  --ru: #A01528;
  --pos: #1A6B2D; --pos-bg: #E8F5EC;
  --neg: #B8302E; --neg-bg: #FFF0F0;
  --neu: #6B7A99; --neu-bg: #F2F4F8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-family: 'Inter', 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--tx); -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; line-height: 1.55; }
a { color: inherit; text-decoration: none; }

header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(250,251,254,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--bd);
}
.header-inner {
  max-width: 1100px; margin: 0 auto; padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark { width: 36px; height: 36px; }
.brand-mark svg { width: 100%; height: 100%; display: block; }
.brand-name { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; }
.nav-links { display: flex; gap: 24px; font-size: 13px; font-weight: 600; color: var(--tx2); }
.nav-links a:hover, .nav-links a.active { color: var(--am); }

.menu-toggle { display: none; width: 40px; height: 40px; align-items: center; justify-content: center; background: transparent; border: none; cursor: pointer; padding: 0; }
.menu-toggle span { display: block; width: 22px; height: 2px; background: var(--tx); position: relative; }
.menu-toggle span::before, .menu-toggle span::after { content: ''; position: absolute; left: 0; width: 22px; height: 2px; background: var(--tx); transition: transform .2s; }
.menu-toggle span::before { top: -7px; }
.menu-toggle span::after { top: 7px; }
.menu-toggle.open span { background: transparent; }
.menu-toggle.open span::before { top: 0; transform: rotate(45deg); }
.menu-toggle.open span::after { top: 0; transform: rotate(-45deg); }
.mobile-drawer { display: none; position: fixed; top: 0; right: 0; width: 75%; max-width: 300px; height: 100vh; background: var(--sf); border-left: 1px solid var(--bd); padding: 80px 28px 24px; z-index: 200; transform: translateX(100%); transition: transform .25s ease-out; box-shadow: -8px 0 24px rgba(0,0,0,0.06); }
.mobile-drawer.open { transform: translateX(0); }
.mobile-drawer a { display: block; padding: 14px 0; font-size: 17px; font-weight: 700; color: var(--tx); border-bottom: 1px solid var(--bd); }
.mobile-drawer a.active { color: var(--am); }
.drawer-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.32); z-index: 150; }
.drawer-backdrop.open { display: block; }
@media (max-width: 720px) {
  .nav-links { display: none; }
  .menu-toggle { display: inline-flex; }
  .mobile-drawer { display: block; }
}

main { max-width: 800px; margin: 0 auto; padding: 48px 24px 120px; }

.page-header { margin-bottom: 48px; }
.page-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 12px; background: var(--am3);
  border: 1px solid rgba(196,153,48,0.25); border-radius: 999px;
  font-size: 10px; font-weight: 800; color: var(--am);
  letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 16px;
}
.page-title {
  font-size: clamp(28px, 5vw, 42px); font-weight: 900;
  letter-spacing: -1.5px; margin-bottom: 8px; line-height: 1.2;
}
.page-title .accent { color: var(--am); }
.page-desc { font-size: 14px; color: var(--tx2); max-width: 640px; line-height: 1.7; }

/* TOC */
.toc {
  background: var(--sf); border: 1px solid var(--bd); border-radius: 12px;
  padding: 24px 28px; margin-bottom: 56px;
}
.toc-title { font-size: 13px; font-weight: 800; color: var(--dm); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px; }
.toc-list { list-style: none; }
.toc-list li { margin-bottom: 6px; }
.toc-list a {
  font-size: 14px; font-weight: 600; color: var(--tx2);
  display: flex; align-items: baseline; gap: 10px;
  padding: 6px 0; border-radius: 6px; transition: color .15s;
}
.toc-list a:hover { color: var(--am); }
.toc-num { font-size: 11px; font-weight: 800; color: var(--am); min-width: 28px; font-family: 'SF Mono', monospace; }
.toc-list .toc-divider { height: 1px; background: var(--bd); margin: 12px 0; }

/* Chapter */
.chapter {
  margin-bottom: 64px;
  scroll-margin-top: 100px;
}
.chapter-label {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 11px; font-weight: 800; color: var(--am);
  letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 8px;
}
.chapter h2 {
  font-size: clamp(22px, 3.5vw, 30px); font-weight: 900;
  letter-spacing: -0.8px; margin-bottom: 20px; line-height: 1.25;
}
.chapter h3 {
  font-size: 17px; font-weight: 800; letter-spacing: -0.3px;
  margin-top: 32px; margin-bottom: 12px; color: var(--tx);
}
.chapter p {
  font-size: 15px; line-height: 1.75; color: var(--tx2);
  margin-bottom: 14px;
}
.chapter ul, .chapter ol {
  font-size: 15px; line-height: 1.75; color: var(--tx2);
  margin-bottom: 14px; padding-left: 24px;
}
.chapter li { margin-bottom: 6px; }

/* Quote block */
.quote {
  background: var(--am4); border-left: 3px solid var(--am);
  padding: 14px 18px; border-radius: 0 8px 8px 0;
  margin: 18px 0; font-size: 14px; line-height: 1.7;
  color: var(--tx); font-weight: 500;
}
.quote-attr { font-size: 12px; color: var(--dm); margin-top: 6px; font-weight: 600; }

/* Key point box */
.keypoint {
  background: var(--sf); border: 1px solid var(--bd); border-radius: 10px;
  padding: 18px 22px; margin: 18px 0;
}
.keypoint-title { font-size: 12px; font-weight: 800; color: var(--am); letter-spacing: 0.5px; margin-bottom: 8px; text-transform: uppercase; }
.keypoint p { margin-bottom: 6px; font-size: 14px; }

/* Warning box */
.warning {
  background: var(--neg-bg); border-left: 3px solid var(--neg);
  padding: 14px 18px; border-radius: 0 8px 8px 0;
  margin: 18px 0; font-size: 14px; line-height: 1.7; color: var(--neg);
}

/* Table */
.chapter table {
  width: 100%; border-collapse: collapse; margin: 18px 0; font-size: 14px;
}
.chapter th {
  text-align: left; padding: 10px 14px; font-weight: 700; font-size: 12px;
  color: var(--dm); letter-spacing: 0.5px; text-transform: uppercase;
  border-bottom: 2px solid var(--tx); background: var(--bg);
}
.chapter td {
  padding: 10px 14px; border-bottom: 1px solid var(--bd);
  color: var(--tx2); line-height: 1.5;
}
.chapter tr:last-child td { border-bottom: none; }

/* Checklist */
.checklist { list-style: none; padding-left: 0; }
.checklist li {
  padding: 10px 0; border-bottom: 1px solid var(--bd);
  font-size: 14px; color: var(--tx2); display: flex; align-items: flex-start; gap: 10px;
}
.checklist li:last-child { border-bottom: none; }
.check-icon { color: var(--am); font-weight: 800; flex-shrink: 0; margin-top: 1px; }

/* Divider */
.section-divider { height: 1px; background: var(--bd); margin: 56px 0; }

/* Footer */
footer {
  text-align: center; padding: 40px 24px;
  font-size: 11px; color: var(--dm); border-top: 1px solid var(--bd);
}

@media (max-width: 720px) {
  main { padding: 32px 16px 80px; }
  .toc { padding: 18px 20px; }
  .chapter { margin-bottom: 48px; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 124 124" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="hg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#FBE9B5"/>
              <stop offset="0.5" stop-color="#E8C063"/>
              <stop offset="1" stop-color="#C49930"/>
            </linearGradient>
          </defs>
          <g transform="translate(5, 3.5)">
            <path d="M73 24 Q73 12 59 12 Q32 12 32 33 Q32 53 58 57 Q88 61 67 86 Q46 105 26 95" stroke="url(#hg)" stroke-width="15" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="74" cy="18" r="3.8" fill="#A01528"/>
            <circle cx="72.5" cy="16.5" r="1.1" fill="#FFE4D8" opacity="0.85"/>
          </g>
        </svg>
      </div>
      <div class="brand-name">100M1S</div>
    </a>
    <nav class="nav-links">
      <a href="/#about">About</a>
      <a href="/#products">Products</a>
      <a href="/news.html">News</a>
      <a href="/lecture.html" class="active">Lecture</a>
      <a href="/#contact">Contact</a>
    </nav>
    <button class="menu-toggle" id="menu-toggle" aria-label="메뉴 열기" aria-expanded="false"><span></span></button>
  </div>
</header>
<div class="drawer-backdrop" id="drawer-backdrop"></div>
<nav class="mobile-drawer" id="mobile-drawer" aria-label="모바일 메뉴">
  <a href="/#about">About</a>
  <a href="/#products">Products</a>
  <a href="/news.html">News</a>
  <a href="/lecture.html" class="active">Lecture</a>
  <a href="/#contact">Contact</a>
</nav>
<script>
(function(){
  var btn=document.getElementById('menu-toggle');
  var drw=document.getElementById('mobile-drawer');
  var bd=document.getElementById('drawer-backdrop');
  if(!btn||!drw||!bd)return;
  function toggle(open){
    var willOpen=(typeof open==='boolean')?open:!drw.classList.contains('open');
    drw.classList.toggle('open',willOpen);
    bd.classList.toggle('open',willOpen);
    btn.classList.toggle('open',willOpen);
    btn.setAttribute('aria-expanded',willOpen);
  }
  btn.addEventListener('click',function(){toggle();});
  bd.addEventListener('click',function(){toggle(false);});
  drw.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){toggle(false);});});
})();
</script>

<main>
{{CONTENT}}
</main>

<footer>
  &copy; 2026 100M1S. All rights reserved.
</footer>

</body>
</html>
