<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{TITLE}}</title>
<meta name="description" content="{{DESCRIPTION}}">
<meta name="robots" content="{{ROBOTS}}">
<meta property="og:title" content="{{TITLE}}">
<meta property="og:description" content="{{DESCRIPTION}}">
<meta property="og:type" content="article">
<meta property="og:url" content="{{OG_URL}}">
<meta property="og:image" content="{{OG_IMAGE}}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="{{OG_IMAGE}}">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root {
  --bg: #FAFBFE; --sf: #FFFFFF; --bd: #E8ECF2;
  --tx: #1A1D26; --tx2: #3D4351; --dm: #8B95A8;
  --am: #C49930; --am2: #E8C063; --am3: #FBE9B5; --am4: #FFF6E5;
  --ru: #A01528;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--tx); -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; line-height: 1.7; }
a { color: var(--am); text-decoration: none; }
a:hover { text-decoration: underline; }

header {
  background: rgba(250,251,254,0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--bd);
  position: sticky; top: 0; z-index: 100;
}
.header-inner {
  max-width: 800px; margin: 0 auto; padding: 16px 24px;
  display: flex; align-items: center; gap: 10px;
}
.brand-mark {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
}
.brand-mark svg { width: 100%; height: 100%; display: block; }
.brand-name { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; color: var(--tx); }
.brand-name a { color: inherit; text-decoration: none; }

main {
  max-width: 800px; margin: 0 auto; padding: 60px 24px 80px;
}
h1 {
  font-size: 36px; font-weight: 900; letter-spacing: -1px;
  margin-bottom: 8px;
}
.meta { color: var(--dm); font-size: 13px; margin-bottom: 40px; }
h2 {
  font-size: 18px; font-weight: 800; margin-top: 36px; margin-bottom: 12px;
  color: var(--tx); letter-spacing: -0.3px;
}
p, li { font-size: 14px; color: var(--tx2); margin-bottom: 10px; }
ul { padding-left: 20px; margin-bottom: 12px; }
.notice {
  background: var(--am3); border-left: 3px solid var(--am);
  padding: 14px 18px; border-radius: 6px;
  margin: 20px 0; font-size: 13px; color: var(--tx2);
}
.warning {
  background: #FFF0F0; border-left: 3px solid #E84142;
  padding: 14px 18px; border-radius: 6px;
  margin: 20px 0; font-size: 13px; color: var(--tx2);
}

footer {
  background: var(--tx); color: var(--dm); text-align: center;
  padding: 24px; font-size: 11px;
}
footer a { color: var(--dm); margin: 0 10px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand-mark">
      <svg viewBox="0 0 124 124" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="hg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#FBE9B5"/>
            <stop offset="0.5" stop-color="#E8C063"/>
            <stop offset="1" stop-color="#C49930"/>
          </linearGradient>
        </defs>
        <g transform="translate(5, 3.5)">
          <path d="M73 24 Q73 12 59 12 Q32 12 32 33 Q32 53 58 57 Q88 61 67 86 Q46 105 26 95" stroke="url(#hg)" stroke-width="15" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="74" cy="18" r="3.8" fill="#A01528"/>
          <circle cx="72.5" cy="16.5" r="1.1" fill="#FFE4D8" opacity="0.85"/>
        </g>
      </svg>
    </div>
    <div class="brand-name"><a href="/">100M1S</a></div>
  </div>
</header>

<main>
{{CONTENT}}
</main>

<footer>
  <div>
    <a href="/">Home</a>
    <a href="/privacy.html">Privacy</a>
    <a href="/terms.html">Terms</a>
  </div>
  <div style="margin-top: 12px; opacity: 0.6;">© 2026 100M1S · Far. One Step.</div>
</footer>

</body>
</html>
